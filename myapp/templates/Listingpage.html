<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User List</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5 bg-light" style="border:1px solid #ddd; border-radius: 10px;">
    <h1 class="m-4 text-center">User Records <a href="/Add/" class="btn btn-primary">Add User</a></h1>
    <table class="table table-bordered">
        <tr class="bg-info text-white text-center">
            <td>SR NO.</td>
            <td>Name</td>
            <td>Photo</td>
            <td>Email</td>
            <td>Action</td>
        </tr>
        {% for rec in records %}
        <tr class="text-center">
            <td>{{ forloop.counter }}</td>
            <td>{{ rec.name }}</td>
            <td><img src="{{ rec.photo.url }}" class="rounded-circle" height="70px" width="70px"></td>
            <td>{{ rec.email }}</td>
            <td>
                <a href="/Edit/{{ rec.id }}" class="btn btn-success">Edit</a>
                <a href="/Delete/{{ rec.id }}" class="btn btn-danger">Delete</a>
                <a href="/View/{{ rec.id }}" class="btn btn-primary">View</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>
</body>
</html>
